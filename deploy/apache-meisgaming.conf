<VirtualHost *:80>
    ServerName  meisgaming.net
    ServerAlias www.meisgaming.net

    DocumentRoot /var/www/meisgaming/dist

    <Directory /var/www/meisgaming/dist>
        Options -Indexes
        AllowOverride None
        Require all granted

        # SPA fallback — all routes → index.html
        FallbackResource /index.html
    </Directory>

    ErrorLog  ${APACHE_LOG_DIR}/meisgaming_error.log
    CustomLog ${APACHE_LOG_DIR}/meisgaming_access.log combined
</VirtualHost>
